<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certamen 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header> 
    <nav>
    </nav>
    </header>
    <main>
        <h1>Registro de colaboradores</h1>
        <form action="">
            <div class="contenedor">

                <div class="campoNombre">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingrese nombre..." required>
                </div>

                <div class="campoApellido">
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" name="apellido" placeholder="Ingrese apellido..." required>
                </div>

                <div class="campoCargo">
                    <label for="cargo">Cargo:</label>
                    <input type="text" id="cargo" name="cargo" placeholder="Ingrese cargo..." required>
                </div>

                <div class="campoEmail">
                    <label for="correo">Correo corporativo:</label>
                    <input type="email" id="correo" name="correo" placeholder="Ingrese correo nombre@empresa.cl" required>
                </div>

                <button type="submit" id="botonEnviar">Registrar</button>

            </div>
        </form>
        <table>
            <caption>Colaboradores registrados</caption>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Cargo</th>
                    <th>Correo corporativo</th>
                </tr>
            </thead>
            <tbody id="tablaColaboradores">
            </tbody>
        </table>
    </main>
    <footer>
    </footer>
</body>
<script src="scripts.js"></script>
</html>
